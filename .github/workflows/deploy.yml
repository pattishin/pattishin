name: Deploy to Production

on:
  push:
    branches: [main]

# Prevent concurrent deployments (queue instead of cancel)
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  PROJECT_ID: pattishin-site
  SERVICE:    pattishin-api
  REGION:     us-central1

jobs:
  # ─────────────────────────────────────────────────────────
  # Frontend: npm build → Firebase Hosting
  # ─────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Firebase Hosting)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for Workload Identity if you switch later

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId:              ${{ env.PROJECT_ID }}
          channelId:              live

  # ─────────────────────────────────────────────────────────
  # Backend: Docker build → GCR → Cloud Run
  # ─────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Cloud Run)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image    gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --platform managed \
            --region   ${{ env.REGION }} \
            --project  ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --quiet
