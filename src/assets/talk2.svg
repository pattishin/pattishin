<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- Build with Confidence / Frontend Dev — Ascending Impossible Staircase -->
  <rect width="160" height="120" fill="#1c1530"/>
  <!-- Steps ascending right to left (Monument Valley impossible geometry) -->
  <!-- Step 1 - bottom right -->
  <rect x="100" y="88" width="52" height="14" fill="#3a2458"/>
  <rect x="100" y="88" width="52" height="2" fill="#c09840" opacity="0.55"/>
  <rect x="100" y="74" width="14" height="14" fill="#2d1e48"/>
  <!-- Step 2 -->
  <rect x="72" y="74" width="52" height="14" fill="#3a2458"/>
  <rect x="72" y="74" width="52" height="2" fill="#c09840" opacity="0.55"/>
  <rect x="72" y="60" width="14" height="14" fill="#2d1e48"/>
  <!-- Step 3 -->
  <rect x="44" y="60" width="52" height="14" fill="#3a2458"/>
  <rect x="44" y="60" width="52" height="2" fill="#c09840" opacity="0.55"/>
  <rect x="44" y="46" width="14" height="14" fill="#2d1e48"/>
  <!-- Step 4 -->
  <rect x="16" y="46" width="52" height="14" fill="#3a2458"/>
  <rect x="16" y="46" width="52" height="2" fill="#c09840" opacity="0.55"/>
  <rect x="16" y="32" width="14" height="14" fill="#2d1e48"/>
  <!-- Step 5 - top left -->
  <rect x="16" y="24" width="24" height="8" fill="#3a2458"/>
  <rect x="16" y="24" width="24" height="2" fill="#c09840" opacity="0.55"/>
  <!-- Teal accent on riser faces -->
  <rect x="100" y="76" width="2" height="12" fill="#5ab4ac" opacity="0.35"/>
  <rect x="72" y="62" width="2" height="12" fill="#5ab4ac" opacity="0.35"/>
  <rect x="44" y="48" width="2" height="12" fill="#5ab4ac" opacity="0.35"/>
  <rect x="16" y="34" width="2" height="12" fill="#5ab4ac" opacity="0.35"/>
  <!-- Figure silhouette at top (triangle person) -->
  <polygon points="24,22 28,10 32,22" fill="#c09840" opacity="0.8"/>
  <!-- Decorative diamond corner ornaments -->
  <rect x="148" y="8" width="6" height="6" fill="#c05848" opacity="0.65" transform="rotate(45 151 11)"/>
  <rect x="6" y="108" width="6" height="6" fill="#5ab4ac" opacity="0.45" transform="rotate(45 9 111)"/>
  <!-- Subtle star in sky -->
  <circle cx="128" cy="20" r="1.5" fill="#f0e0c8" opacity="0.6"/>
  <circle cx="112" cy="12" r="1" fill="#f0e0c8" opacity="0.5"/>
  <circle cx="140" cy="36" r="1" fill="#f0e0c8" opacity="0.4"/>
</svg>
