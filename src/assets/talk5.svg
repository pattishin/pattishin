<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- Let's Cache / Service Workers — Concentric Arched Gateway -->
  <rect width="160" height="120" fill="#1c1530"/>
  <!-- Side pillars -->
  <rect x="12" y="52" width="10" height="54" fill="#3a2458"/>
  <rect x="138" y="52" width="10" height="54" fill="#3a2458"/>
  <!-- Pillar capitals (top caps) -->
  <rect x="10" y="47" width="14" height="6" fill="#c09840" opacity="0.65"/>
  <rect x="136" y="47" width="14" height="6" fill="#c09840" opacity="0.65"/>
  <!-- Outer arch -->
  <path d="M 22,106 L 22,60 A 58,52 0 0,1 138,60 L 138,106" stroke="#c09840" stroke-width="1.5" opacity="0.6" fill="#2a1840"/>
  <!-- 2nd arch -->
  <path d="M 36,106 L 36,64 A 44,40 0 0,1 124,64 L 124,106" stroke="#c09840" stroke-width="1" opacity="0.5" fill="#1c1530"/>
  <!-- 3rd arch -->
  <path d="M 50,106 L 50,70 A 30,28 0 0,1 110,70 L 110,106" stroke="#5ab4ac" stroke-width="1" opacity="0.55" fill="#2a1840"/>
  <!-- 4th arch (innermost) -->
  <path d="M 64,106 L 64,77 A 16,16 0 0,1 96,77 L 96,106" stroke="#5ab4ac" stroke-width="1" opacity="0.6" fill="#0f0c1a"/>
  <!-- Inner glow through arch -->
  <ellipse cx="80" cy="84" rx="10" ry="9" fill="#5ab4ac" opacity="0.12"/>
  <ellipse cx="80" cy="87" rx="5" ry="5" fill="#c09840" opacity="0.18"/>
  <!-- Base platform -->
  <rect x="6" y="106" width="148" height="6" fill="#3a2458"/>
  <rect x="2" y="112" width="156" height="5" fill="#2d1e48"/>
  <!-- Top finial on the arch -->
  <rect x="78" y="6" width="4" height="42" fill="#c09840" opacity="0.25"/>
  <polygon points="80,4 85,16 80,13 75,16" fill="#c09840" opacity="0.75"/>
  <!-- Diamond ornament at peak -->
  <rect x="77" y="0" width="6" height="6" fill="#c05848" opacity="0.85" transform="rotate(45 80 3)"/>
</svg>
