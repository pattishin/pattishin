<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- Google I/O 2016 — Radiant Geometric Star / Keynote Spotlight -->
  <rect width="160" height="120" fill="#1c1530"/>
  <!-- Outer subtle ring -->
  <circle cx="80" cy="60" r="50" stroke="#c09840" stroke-width="0.8" opacity="0.2"/>
  <!-- 8 radiating spikes -->
  <polygon points="80,8  83,30 77,30" fill="#c09840" opacity="0.8"/>
  <polygon points="80,112 77,90 83,90" fill="#c09840" opacity="0.8"/>
  <polygon points="28,60 50,57 50,63" fill="#c09840" opacity="0.8"/>
  <polygon points="132,60 110,63 110,57" fill="#c09840" opacity="0.8"/>
  <polygon points="116,16 103,34 97,28" fill="#c09840" opacity="0.7"/>
  <polygon points="44,16  57,34 63,28" fill="#c09840" opacity="0.7"/>
  <polygon points="116,104 97,92 103,86" fill="#c09840" opacity="0.7"/>
  <polygon points="44,104  63,86 57,92" fill="#c09840" opacity="0.7"/>
  <!-- Mid ring -->
  <circle cx="80" cy="60" r="28" stroke="#5ab4ac" stroke-width="1" opacity="0.45"/>
  <!-- Inner filled circle -->
  <circle cx="80" cy="60" r="20" fill="#2a1840"/>
  <circle cx="80" cy="60" r="18" fill="#1c1530"/>
  <!-- Inner cross detail -->
  <polygon points="80,44 82,58 80,72 78,58" fill="#5ab4ac" opacity="0.75"/>
  <polygon points="64,60 78,58 96,60 78,62" fill="#5ab4ac" opacity="0.75"/>
  <!-- Center gem -->
  <circle cx="80" cy="60" r="5" fill="#2a1840"/>
  <circle cx="80" cy="60" r="4" fill="#c09840" opacity="0.9"/>
  <circle cx="80" cy="60" r="2" fill="#f0e0c8"/>
  <!-- Small accent diamonds at mid-ring intercepts -->
  <rect x="77" y="31" width="5" height="5" fill="#c09840" opacity="0.5" transform="rotate(45 80 33.5)"/>
  <rect x="77" y="86" width="5" height="5" fill="#c09840" opacity="0.5" transform="rotate(45 80 88.5)"/>
</svg>
