<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- Google I/O Extended 2018 — Faceted Crystal Gem -->
  <rect width="160" height="120" fill="#1c1530"/>
  <!-- Gem crown (top facets) -->
  <polygon points="80,12 110,42 80,34 50,42" fill="#3e2c5e"/>
  <polygon points="80,12 110,42 80,34" fill="#5c3a8a" opacity="0.75"/>
  <polygon points="80,12 50,42 80,34" fill="#4a2a6a" opacity="0.85"/>
  <!-- Top crown edge highlights -->
  <line x1="80" y1="12" x2="110" y2="42" stroke="#c09840" stroke-width="1.2" opacity="0.7"/>
  <line x1="80" y1="12" x2="50" y2="42" stroke="#c09840" stroke-width="1.2" opacity="0.7"/>
  <line x1="110" y1="42" x2="80" y2="34" stroke="#f0e0c8" stroke-width="0.6" opacity="0.45"/>
  <line x1="50" y1="42" x2="80" y2="34" stroke="#5ab4ac" stroke-width="0.6" opacity="0.45"/>
  <!-- Gem pavilion (lower body) -->
  <polygon points="50,42 110,42 130,72 80,108 30,72" fill="#2a1840"/>
  <!-- Pavilion facets -->
  <polygon points="80,34 110,42 130,72 80,108" fill="#3a2458"/>
  <polygon points="80,34 50,42 30,72 80,108" fill="#2d1e48"/>
  <!-- Girdle highlight -->
  <polygon points="50,42 110,42 125,65 35,65" fill="#5c3a8a" opacity="0.35"/>
  <!-- Light reflections -->
  <polygon points="80,34 108,42 94,56" fill="#5ab4ac" opacity="0.4"/>
  <polygon points="80,34 52,42 66,56" fill="#f0e0c8" opacity="0.22"/>
  <polygon points="80,92 90,76 94,56 80,62" fill="#c09840" opacity="0.28"/>
  <!-- Edge highlights -->
  <line x1="110" y1="42" x2="130" y2="72" stroke="#c09840" stroke-width="1" opacity="0.55"/>
  <line x1="50" y1="42" x2="30" y2="72" stroke="#c09840" stroke-width="1" opacity="0.55"/>
  <line x1="30" y1="72" x2="80" y2="108" stroke="#c09840" stroke-width="0.8" opacity="0.45"/>
  <line x1="130" y1="72" x2="80" y2="108" stroke="#c09840" stroke-width="0.8" opacity="0.45"/>
  <!-- Top glint -->
  <polygon points="80,12 87,22 80,18 73,22" fill="#f0e0c8" opacity="0.7"/>
  <!-- Base line -->
  <line x1="30" y1="72" x2="130" y2="72" stroke="#c09840" stroke-width="0.5" opacity="0.3"/>
</svg>
